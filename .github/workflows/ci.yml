name: CI

on:
  pull_request:
    branches:
      - main
      - dev

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    uses: ./.github/workflows/workflow-test.yml
    permissions:
      contents: read

  check-changeset:
    name: Check Changeset
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CHANGESET_BASE_SHA: ${{ github.event.pull_request.base.sha }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Setup
        uses: ./.github/actions/ci-setup
        with:
          node-version: "24"
      - name: Detect Package Changes
        id: changes
        env:
          CHANGESET_HEAD_SHA: ${{ github.sha }}
          CHANGESET_HEAD_REF: ${{ github.head_ref }}
        shell: bash
        run: |
          case "$CHANGESET_HEAD_REF" in
            changeset-release/*)
              echo "packages_changed=false" >> "$GITHUB_OUTPUT"
              exit 0
              ;;
          esac
          if git diff --name-only "$CHANGESET_BASE_SHA" "$CHANGESET_HEAD_SHA" | grep -qE '^packages/'; then
            echo "packages_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "packages_changed=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Check Changeset
        if: ${{ steps.changes.outputs.packages_changed == 'true' }}
        run: pnpm changeset status --verbose --since $CHANGESET_BASE_SHA
      - name: Skip Changeset Check
        if: ${{ steps.changes.outputs.packages_changed != 'true' }}
        run: echo "No changes under packages/**, skipping changeset check."

  done:
    name: Done
    needs:
      - validate
      - check-changeset
    if: ${{ always() }}
    runs-on: ubuntu-latest
    permissions: {}

    steps:
      - name: Fail If Any Job Failed
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'skipped') || contains(needs.*.result, 'cancelled') }}
        run: exit 1
