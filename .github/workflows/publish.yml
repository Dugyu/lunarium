name: Publish

on:
  push:
    branches:
      - main

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    environment: npm
    if: >-
      ${{ github.event_name == 'push' && vars.ENABLE_PUBLISH == 'true' }}
    permissions:
      contents: write
      id-token: write
      pull-requests: read

    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup
        uses: ./.github/actions/ci-setup
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          # Disable caching to ensure a clean install before publishing
          package-manager-cache: "false"

      - name: Detect Version Packages PR (squash merge)
        id: vp
        env:
          GH_TOKEN: ${{ github.token }}
          PREFIX: changeset-release/
          SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          prs_json="$(gh api -H "Accept: application/vnd.github+json" "/repos/$REPO/commits/$SHA/pulls" || true)"
          pr_number="$(echo "$prs_json" | jq -r '.[0].number // empty')"

          if [ -z "$pr_number" ]; then
            echo "version_packages=false" >> "$GITHUB_OUTPUT"
            echo "reason=no_associated_pr" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          head_ref="$(gh pr view "$pr_number" --json headRefName --jq '.headRefName')"
          is_vp="$(echo "$head_ref" | jq -r --arg p "$PREFIX" 'startswith($p)')"

          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"
          echo "head_ref=$head_ref" >> "$GITHUB_OUTPUT"
          echo "version_packages=$is_vp" >> "$GITHUB_OUTPUT"

      - name: Publish (Changesets)
        if: ${{ steps.vp.outputs.version_packages == 'true' }}
        id: changesets
        continue-on-error: true
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf # v1
        with:
          publish: pnpm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Repair GitHub Releases (partial publish safe)
        if: ${{ steps.vp.outputs.version_packages == 'true' && steps.changesets.outcome == 'failure' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/scripts/repair-github-releases.mjs

      - name: Fail job if publish failed
        if: ${{ steps.vp.outputs.version_packages == 'true' && steps.changesets.outcome == 'failure' }}
        run: exit 1
