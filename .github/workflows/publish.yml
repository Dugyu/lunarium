name: Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'publish' to confirm"
        required: true
        type: string

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    environment: npm
    if: >-
      ${{ (github.event_name == 'workflow_dispatch' && inputs.confirm == 'publish') || (github.event_name == 'push' && vars.ENABLE_PUBLISH == 'true' && (contains(github.event.head_commit.message, 'changeset-release/') || startsWith(github.event.head_commit.message, 'Version Packages'))) }}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup
        uses: ./.github/actions/ci-setup
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: "false"

      - name: Publish
        run: pnpm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
