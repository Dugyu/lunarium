name: Publish

on:
  push:
    branches:
      - main

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    environment: npm
    if: >-
      ${{ github.event_name == 'push' && vars.ENABLE_PUBLISH == 'true' && (contains(github.event.head_commit.message, 'changeset-release/') || startsWith(github.event.head_commit.message, 'Version Packages')) }}
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup
        uses: ./.github/actions/ci-setup
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: "false"

      - name: Publish (Changesets)
        id: changesets
        continue-on-error: true
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf # v1
        with:
          publish: pnpm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Repair GitHub Releases (partial publish safe)
        if: ${{ steps.changesets.outcome == 'failure' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/scripts/repair-github-releases.mjs

      - name: Fail job if publish failed
        if: ${{ steps.changesets.outcome == 'failure' }}
        run: exit 1
