packages:
  - apps/*
  - packages/**
  - projects/mtc-color-picker
  - "!**/node_modules/**"
  - "!**/dist/**"
  - "!**/output/**"
catalogs:
  utils:
    clsx: 2.1.1
  lynx:
    "@lynx-js/react": 0.114.4
    "@lynx-js/web-core": 0.18.1
    "@lynx-js/web-elements": 0.8.9
  lynx-dev:
    "@lynx-js/preact-devtools": 5.0.1-cf9aef5
    "@lynx-js/types": 3.4.11
  lynx-build:
    "@lynx-js/qrcode-rsbuild-plugin": 0.4.3
    "@lynx-js/react-rsbuild-plugin": 0.11.4
    "@lynx-js/rspeedy": 0.11.8
  react18:
    "@types/react": 18.3.24
    "@types/react-dom": 18.3.7
    react: 18.3.1
    react-dom: 18.3.1
  rsbuild:
    "@rsbuild/core": 1.6.1
    "@rsbuild/plugin-react": 1.4.2
    "@rsbuild/plugin-type-check": 1.2.4
  rslib:
    "@rslib/core": 0.17.1
  tailwind:
    "@lynx-js/tailwind-preset": 0.4.0
    rsbuild-plugin-tailwindcss: 0.2.3
    tailwind-merge: 2.6.0
    tailwindcss: 3.4.17
  ts:
    typescript: 5.9.2
    "@types/node": 24.6.1
    "@typescript/native-preview": 7.0.0-dev.20251103.1

overrides:
  "@lynx-js/react-rsbuild-plugin@0.10.11>@lynx-js/react-webpack-plugin": "file:projects/mtc-color-picker/lynx-js-react-webpack-plugin-0.6.19.tgz"
  "@lynx-js/rspeedy@0.10.8>@rsbuild/core": "1.4.15"

packageExtensions:
  "@lynx-js/react-rsbuild-plugin@0.10.11":
    peerDependencies:
      "@rsbuild/core": "1.4.15"
  "@lynx-js/qrcode-rsbuild-plugin@0.4.1":
    peerDependencies:
      "@rsbuild/core": "1.4.15"

enablePrePostScripts: false
ignorePatchFailures: false
ignoredBuiltDependencies:
  - "@biomejs/biome"
  - "@parcel/watcher"
  - "@swc/core"
  - core-js
  - unrs-resolver
onlyBuiltDependencies:
  - dprint
  - esbuild
optimisticRepeatInstall: true
resolutionMode: lowest-direct
strictDepBuilds: true
